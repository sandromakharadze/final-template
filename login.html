<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TuneCrate — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <a href="index.html" class="nav__logo" aria-label="TuneCrate home">
        <span class="nav__logo-icon" aria-hidden="true">◈</span>
        TuneCrate
      </a>
      <ul class="nav__links" role="list">
        <li><a href="index.html" class="nav__link">Discover</a></li>
        <li><a href="saved.html" class="nav__link">My Crate</a></li>
        <li><a href="login.html" class="nav__link nav__link--active" aria-current="page">Profile</a></li>
      </ul>
      <button class="nav__menu-btn" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-links-mobile">
        <span class="nav__menu-bar"></span>
        <span class="nav__menu-bar"></span>
        <span class="nav__menu-bar"></span>
      </button>
    </nav>
    <ul class="nav__links--mobile" id="nav-links-mobile" role="list" hidden>
      <li><a href="index.html" class="nav__link">Discover</a></li>
      <li><a href="saved.html" class="nav__link">My Crate</a></li>
      <li><a href="login.html" class="nav__link nav__link--active" aria-current="page">Profile</a></li>
    </ul>
  </header>

  <main id="main-content">

    <section class="page-header">
      <div class="page-header__inner">
        <div class="page-header__text">
          <p class="hero__eyebrow">Your settings</p>
          <h1 class="page-header__heading">Profile</h1>
          <p class="page-header__sub">Tell us a bit about your taste.</p>
        </div>
      </div>
    </section>

    <section class="profile-section" aria-labelledby="profile-form-heading">
      <div class="profile-section__inner">

        <!-- Saved confirmation banner -->
        <div class="profile-banner" id="profile-banner" hidden role="status" aria-live="polite">
          <span aria-hidden="true">✓</span>
          <span id="profile-banner-msg">Profile saved!</span>
        </div>

        <article class="profile-card">
          <h2 class="profile-card__heading" id="profile-form-heading">Your details</h2>

          <form class="profile-form" id="profile-form" novalidate>

            <!-- 1. Text — username -->
            <div class="profile-form__field">
              <label class="profile-form__label" for="username">
                Display name <span class="profile-form__required" aria-hidden="true">*</span>
              </label>
              <input
                type="text"
                id="username"
                name="username"
                class="profile-form__input"
                placeholder="e.g. vinyl_lover"
                minlength="2"
                maxlength="30"
                required
                autocomplete="nickname"
                aria-required="true"
                aria-describedby="username-error"
              />
              <p class="profile-form__error" id="username-error" role="alert" hidden></p>
            </div>

            <!-- 2. Email -->
            <div class="profile-form__field">
              <label class="profile-form__label" for="email">
                Email <span class="profile-form__required" aria-hidden="true">*</span>
              </label>
              <input
                type="email"
                id="email"
                name="email"
                class="profile-form__input"
                placeholder="you@example.com"
                required
                autocomplete="email"
                aria-required="true"
                aria-describedby="email-error"
              />
              <p class="profile-form__error" id="email-error" role="alert" hidden></p>
            </div>

            <!-- 3. Select — favourite genre -->
            <div class="profile-form__field">
              <label class="profile-form__label" for="genre">Favourite genre</label>
              <select
                id="genre"
                name="genre"
                class="profile-form__select"
                aria-label="Select your favourite genre"
              >
                <option value="">— pick one —</option>
                <option value="rock">Rock</option>
                <option value="hiphop">Hip-Hop</option>
                <option value="electronic">Electronic</option>
                <option value="jazz">Jazz</option>
                <option value="classical">Classical</option>
                <option value="pop">Pop</option>
                <option value="rnb">R&amp;B</option>
                <option value="metal">Metal</option>
                <option value="folk">Folk</option>
                <option value="other">Other</option>
              </select>
            </div>

            <!-- 4. Radio — preferred view -->
            <fieldset class="profile-form__fieldset">
              <legend class="profile-form__label">Default search type</legend>
              <div class="profile-form__radio-group">
                <label class="profile-form__radio-label">
                  <input type="radio" name="search-type" value="musicTrack" checked />
                  Tracks
                </label>
                <label class="profile-form__radio-label">
                  <input type="radio" name="search-type" value="album" />
                  Albums
                </label>
                <label class="profile-form__radio-label">
                  <input type="radio" name="search-type" value="musicArtist" />
                  Artists
                </label>
              </div>
            </fieldset>

            <!-- 5. Checkbox — explicit content -->
            <div class="profile-form__field">
              <label class="profile-form__checkbox-label">
                <input
                  type="checkbox"
                  id="explicit"
                  name="explicit"
                  class="profile-form__checkbox"
                />
                Allow explicit content in results
              </label>
            </div>

            <!-- 6. Textarea — bio -->
            <div class="profile-form__field">
              <label class="profile-form__label" for="bio">Bio</label>
              <textarea
                id="bio"
                name="bio"
                class="profile-form__textarea"
                placeholder="A sentence about your music taste…"
                maxlength="200"
                rows="3"
                aria-describedby="bio-count"
              ></textarea>
              <p class="profile-form__hint" id="bio-count">0 / 200</p>
            </div>

            <div class="profile-form__actions">
              <button type="submit" class="btn btn--primary" id="save-btn">Save profile</button>
              <button type="button" class="btn btn--outline" id="reset-btn">Reset</button>
            </div>

          </form>
        </article>

      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <p class="site-footer__brand">
        <span aria-hidden="true">◈</span> TuneCrate
      </p>
      <p class="site-footer__credit">
        Music data from <a href="https://developer.apple.com/library/archive/documentation/AudioVideo/Conceptual/iTuneSearchAPI/" target="_blank" rel="noopener noreferrer" class="site-footer__link">iTunes Search API</a>
      </p>
    </div>
  </footer>

  <script type="module" src="js/login.js"></script>
</body>
</html>
